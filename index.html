<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>なでなで犬</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: #f0f8ff;
  }

  #dog {
    position: absolute;
    width: 200px;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    touch-action: none; /* 超重要 */
  }
</style>
</head>
<body>

<img id="dog" src="nomal.png">

<script>
const dog = document.getElementById("dog");

let startX = 0;
let startY = 0;
let isDragging = false;

dog.addEventListener("touchstart", (e) => {
  const touch = e.touches[0];
  startX = touch.clientX;
  startY = touch.clientY;
  isDragging = false;
});

dog.addEventListener("touchmove", (e) => {
  const touch = e.touches[0];
  const dx = touch.clientX - startX;
  const dy = touch.clientY - startY;

  // 一定以上動いたらドラッグ扱い
  if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
    isDragging = true;

    dog.style.left = touch.clientX + "px";
    dog.style.top = touch.clientY + "px";
    dog.style.transform = "translate(-50%, -50%)";
  }
});

dog.addEventListener("touchend", (e) => {
  if (!isDragging) {
    // スワイプじゃなく「なでなで」
    const y = startY;
    const height = window.innerHeight;

    if (y < height / 3) {
      dog.src = "head.png";
    } else if (y < height * 2 / 3) {
      dog.src = "body.png";
    } else {
      dog.src = "foot.png";
    }

    setTimeout(() => {
      dog.src = "nomal.png";
    }, 1000);
  }
});
</script>

</body>
</html>
