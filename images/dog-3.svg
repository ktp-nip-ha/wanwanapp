<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <ellipse cx="100" cy="130" rx="50" ry="45" fill="#8B5A3C"/>
  
  <!-- Head (tilted, licking) -->
  <circle cx="95" cy="75" r="35" fill="#A0522D" transform="rotate(-15 95 75)"/>
  
  <!-- Ears (tilted) -->
  <ellipse cx="70" cy="50" rx="15" ry="25" fill="#8B5A3C" transform="rotate(-30 70 50)"/>
  <ellipse cx="120" cy="50" rx="15" ry="25" fill="#8B5A3C" transform="rotate(0 120 50)"/>
  
  <!-- Eyes (happy, squinting) -->
  <path d="M 85 70 Q 90 73 95 70" stroke="black" stroke-width="2" fill="none"/>
  <path d="M 100 70 Q 105 73 110 70" stroke="black" stroke-width="2" fill="none"/>
  
  <!-- Nose -->
  <ellipse cx="95" cy="82" rx="6" ry="5" fill="black"/>
  
  <!-- Tongue (licking) -->
  <ellipse cx="95" cy="95" rx="8" ry="12" fill="#FF69B4"/>
  
  <!-- Front legs -->
  <rect x="80" y="165" width="12" height="30" rx="6" fill="#A0522D"/>
  <rect x="108" y="165" width="12" height="30" rx="6" fill="#A0522D"/>
  
  <!-- Back legs -->
  <rect x="70" y="165" width="12" height="30" rx="6" fill="#8B5A3C"/>
  <rect x="118" y="165" width="12" height="30" rx="6" fill="#8B5A3C"/>
  
  <!-- Tail (wagging up) -->
  <path d="M 140 110 Q 165 100 160 70" stroke="#8B5A3C" stroke-width="15" fill="none" stroke-linecap="round"/>
</svg>
