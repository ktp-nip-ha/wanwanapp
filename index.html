<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>なでなで犬</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: #f0f8ff;
  }
  body {
  background-image: url("bg.png");
  background-size: cover;
  background-position: center;
}

  #dog {
    position: absolute;
    width: 200px;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    touch-action: none;
  }

  /* ぽよぽよアニメ */
  .poyo {
    animation: poyo 0.4s ease;
  }

  @keyframes poyo {
    0%   { transform: translate(-50%, -50%) scale(1); }
    50%  { transform: translate(-50%, -50%) scale(1.2); }
    100% { transform: translate(-50%, -50%) scale(1); }
  }
</style>
</head>
<body>

<img id="dog" src="normal.png">

<script>
const dog = document.getElementById("dog");

let startX = 0;
let startY = 0;
let isDragging = false;

dog.addEventListener("touchstart", (e) => {
  const touch = e.touches[0];
  startX = touch.clientX;
  startY = touch.clientY;
  isDragging = false;
});

dog.addEventListener("touchmove", (e) => {
  const touch = e.touches[0];
  const dx = touch.clientX - startX;
  const dy = touch.clientY - startY;

  if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
    isDragging = true;

    dog.style.left = touch.clientX + "px";
    dog.style.top = touch.clientY + "px";
  }
});

dog.addEventListener("touchend", () => {

  // ドラッグじゃなかった＝なでなで
  if (!isDragging) {

    // 👇 ここで位置によって分岐
    const rect = dog.getBoundingClientRect();
    const dogY = startY - rect.top;
    const dogH = rect.height;

    if (dogY < dogH / 3) {
      dog.src = "head.png";
    } else if (dogY < dogH * 2 / 3) {
      dog.src = "body.png";
    } else {
      dog.src = "foot.png";
    }

    // 👇 ぽよぽよ追加
    dog.classList.remove("poyo");
    void dog.offsetWidth; // 再発火用
    dog.classList.add("poyo");

    // 👇 2秒後に戻す
    setTimeout(() => {
      dog.src = "normal.png";
    }, 2000);
  }
});
</script>

</body>
</html>
