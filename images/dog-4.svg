<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <ellipse cx="100" cy="130" rx="50" ry="45" fill="#8B5A3C"/>
  
  <!-- Head (happy and satisfied) -->
  <circle cx="100" cy="70" r="35" fill="#A0522D"/>
  
  <!-- Ears (relaxed, slightly back) -->
  <ellipse cx="75" cy="48" rx="15" ry="25" fill="#8B5A3C" transform="rotate(10 75 48)"/>
  <ellipse cx="125" cy="48" rx="15" ry="25" fill="#8B5A3C" transform="rotate(-10 125 48)"/>
  
  <!-- Eyes (closed happy) -->
  <path d="M 88 68 Q 92 70 96 68" stroke="black" stroke-width="2" fill="none"/>
  <path d="M 104 68 Q 108 70 112 68" stroke="black" stroke-width="2" fill="none"/>
  
  <!-- Nose -->
  <ellipse cx="100" cy="80" rx="6" ry="5" fill="black"/>
  
  <!-- Big happy smile -->
  <path d="M 95 82 Q 100 90 105 82" stroke="black" stroke-width="2" fill="none"/>
  
  <!-- Blush marks -->
  <circle cx="70" cy="75" r="6" fill="#FFB6C1" opacity="0.6"/>
  <circle cx="130" cy="75" r="6" fill="#FFB6C1" opacity="0.6"/>
  
  <!-- Front legs -->
  <rect x="80" y="165" width="12" height="30" rx="6" fill="#A0522D"/>
  <rect x="108" y="165" width="12" height="30" rx="6" fill="#A0522D"/>
  
  <!-- Back legs -->
  <rect x="70" y="165" width="12" height="30" rx="6" fill="#8B5A3C"/>
  <rect x="118" y="165" width="12" height="30" rx="6" fill="#8B5A3C"/>
  
  <!-- Tail (wagging happily) -->
  <path d="M 140 110 Q 170 95 165 60" stroke="#8B5A3C" stroke-width="15" fill="none" stroke-linecap="round"/>
  
  <!-- Heart near head -->
  <text x="50" y="55" font-size="20">💕</text>
</svg>
