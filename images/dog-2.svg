<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <ellipse cx="100" cy="130" rx="50" ry="45" fill="#8B5A3C"/>
  
  <!-- Head (bowing down) -->
  <circle cx="100" cy="90" r="35" fill="#A0522D"/>
  
  <!-- Ears (flopping down) -->
  <ellipse cx="75" cy="75" rx="15" ry="25" fill="#8B5A3C" transform="rotate(-20 75 75)"/>
  <ellipse cx="125" cy="75" rx="15" ry="25" fill="#8B5A3C" transform="rotate(20 125 75)"/>
  
  <!-- Eyes (looking down) -->
  <circle cx="90" cy="85" r="4" fill="black"/>
  <circle cx="110" cy="85" r="4" fill="black"/>
  
  <!-- Nose (down) -->
  <ellipse cx="100" cy="100" rx="6" ry="5" fill="black"/>
  
  <!-- Mouth (happy) -->
  <path d="M 100 100 Q 95 105 90 103" stroke="black" stroke-width="2" fill="none"/>
  <path d="M 100 100 Q 105 105 110 103" stroke="black" stroke-width="2" fill="none"/>
  
  <!-- Front legs -->
  <rect x="80" y="165" width="12" height="30" rx="6" fill="#A0522D"/>
  <rect x="108" y="165" width="12" height="30" rx="6" fill="#A0522D"/>
  
  <!-- Back legs -->
  <rect x="70" y="165" width="12" height="30" rx="6" fill="#8B5A3C"/>
  <rect x="118" y="165" width="12" height="30" rx="6" fill="#8B5A3C"/>
  
  <!-- Tail (wagging down) -->
  <path d="M 140 110 Q 150 120 145 135" stroke="#8B5A3C" stroke-width="15" fill="none" stroke-linecap="round"/>
</svg>
