<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>なでなで犬</title>
  <style>
    body {
      text-align: center;
      background: #f0f8ff;
    }
    img {
      width: 300px;
      cursor: pointer;
      user-select: none;
      transition: transform 0.2s;
    }
    .poyo {
      animation: poyo 0.5s ease-in-out infinite alternate;
    }
    @keyframes poyo {
      0% { transform: scale(1, 1); }
      100% { transform: scale(1.1, 0.9); }
    }
  </style>
</head>
<body>

  <h2>わんこをなでてね！</h2>
  <img id="dog" src="nomal.png">

  <script>
    const dog = document.getElementById("dog");

    dog.addEventListener("click", function(e) {
      const y = e.offsetY;
      const height = dog.clientHeight;

      if (y < height / 3) {
        dog.src = "head.png";
      } else if (y < height * 2 / 3) {
        dog.src = "body.png";
      } else {
        dog.src = "foot.png";
      }
      dog.classList.add("poyo");

      setTimeout(() => {
        dog.src = "nomal.png";
        dog.classList.remove("poyo");
      }, 2000);
    });
  </script>

</body>
</html>
