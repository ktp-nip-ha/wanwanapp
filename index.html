<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>なでなで犬</title>
  <style>
    body {
      text-align: center;
      background: #f0f8ff;
    }
    img {
      width: 300px;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>
<body>

  <h2>わんこをなでてね！</h2>
  <img id="dog" src="nomal.png">

  <script>
    const dog = document.getElementById("dog");

    dog.addEventListener("click", function(e) {
      const y = e.offsetY;
      const height = dog.clientHeight;

      if (y < height / 3) {
        dog.src = "head.png";   // 頭なで
      } else if (y < height * 2 / 3) {
        dog.src = "body.png";   // 体なで
      } else {
        dog.src = "foot.png";   // 足なで
      }

      // 1秒後に元に戻る
      setTimeout(() => {
        dog.src = "nomal.png";
      }, 1000);
    });
  </script>

</body>
</html>
