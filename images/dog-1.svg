<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Body -->
  <ellipse cx="100" cy="130" rx="50" ry="45" fill="#8B5A3C"/>
  
  <!-- Head -->
  <circle cx="100" cy="70" r="35" fill="#A0522D"/>
  
  <!-- Ears -->
  <ellipse cx="75" cy="45" rx="15" ry="25" fill="#8B5A3C"/>
  <ellipse cx="125" cy="45" rx="15" ry="25" fill="#8B5A3C"/>
  
  <!-- Eyes -->
  <circle cx="90" cy="65" r="4" fill="black"/>
  <circle cx="110" cy="65" r="4" fill="black"/>
  
  <!-- Nose -->
  <ellipse cx="100" cy="80" rx="6" ry="5" fill="black"/>
  
  <!-- Mouth -->
  <path d="M 100 80 Q 95 85 90 83" stroke="black" stroke-width="2" fill="none"/>
  <path d="M 100 80 Q 105 85 110 83" stroke="black" stroke-width="2" fill="none"/>
  
  <!-- Front legs -->
  <rect x="80" y="165" width="12" height="30" rx="6" fill="#A0522D"/>
  <rect x="108" y="165" width="12" height="30" rx="6" fill="#A0522D"/>
  
  <!-- Back legs -->
  <rect x="70" y="165" width="12" height="30" rx="6" fill="#8B5A3C"/>
  <rect x="118" y="165" width="12" height="30" rx="6" fill="#8B5A3C"/>
  
  <!-- Tail (standing) -->
  <path d="M 140 110 Q 160 80 150 50" stroke="#8B5A3C" stroke-width="15" fill="none" stroke-linecap="round"/>
</svg>
