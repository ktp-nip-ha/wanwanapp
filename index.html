<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>なでなで犬</title>
<style>
  body {
    margin: 0;
    height: 100vh;
    overflow: hidden;
    background: #f0f8ff;
      background-image: url("bg.png");
    background-size: cover;
    background-position: center;
  }


  #dog {
    position: absolute;
    width: 200px;
    left: 50%;
    top: 50%;
    transform: translate(-50%, -50%);
    touch-action: none;
  }

  /* ぽよ */
  .poyo {
    animation: poyo 0.4s ease;
  }

  @keyframes poyo {
    0%   { transform: translate(-50%, -50%) scale(1); }
    50%  { transform: translate(-50%, -50%) scale(1.2); }
    100% { transform: translate(-50%, -50%) scale(1); }
  }

  /* キラキラ */
  .sparkle {
    position: absolute;
    pointer-events: none;
    font-size: 24px;
    animation: sparkle 0.8s forwards;
  }

  @keyframes sparkle {
    0% { opacity: 1; transform: scale(0.5); }
    100% { opacity: 0; transform: scale(1.5) translateY(-20px); }
  }
</style>
</head>
<body>

<img id="dog" src="normal.png">

<!-- 音 -->
<audio id="sound"></audio>

<script>
const dog = document.getElementById("dog");
const sound = document.getElementById("sound");
const sounds = ["wan1.mp3", "wan2.mp3", "wan3.mp3"];

let startX = 0;
let startY = 0;
let isDragging = false;

dog.addEventListener("touchstart", (e) => {
  const touch = e.touches[0];
  startX = touch.clientX;
  startY = touch.clientY;
  isDragging = false;
});

dog.addEventListener("touchmove", (e) => {
  const touch = e.touches[0];
  const dx = touch.clientX - startX;
  const dy = touch.clientY - startY;

  if (Math.abs(dx) > 10 || Math.abs(dy) > 10) {
    isDragging = true;
    dog.style.left = touch.clientX + "px";
    dog.style.top = touch.clientY + "px";
  }
});

dog.addEventListener("touchend", (e) => {

  if (!isDragging) {

    const height = window.innerHeight;

    // 👇 ここで位置によって分岐
    const rect = dog.getBoundingClientRect();
    const dogY = startY - rect.top;
    const dogH = rect.height;

    if (dogY < dogH / 3) {
      dog.src = "head.png";
    } else if (dogY < dogH * 2 / 3) {
      dog.src = "body.png";
    } else {
      dog.src = "foot.png";
    }

    // ぽよ
    dog.classList.remove("poyo");
    void dog.offsetWidth;
    dog.classList.add("poyo");

    // 🔊 音
  const random = Math.floor(Math.random() * sounds.length);
  sound.src = sounds[random];
  sound.pause();
  sound.currentTime = 0;
  sound.play();

    // ✨ キラキラ
    createSparkle(startX, startY);

    // 戻す
    setTimeout(() => {
      dog.src = "normal.png";
    }, 2000);
  }
});

// キラキラ生成
function createSparkle(x, y) {
  for (let i = 0; i < 5; i++) {
    const span = document.createElement("span");
    span.className = "sparkle";
    span.innerText = "✨";

    span.style.left = (x + Math.random() * 40 - 20) + "px";
    span.style.top = (y + Math.random() * 40 - 20) + "px";

    document.body.appendChild(span);

    setTimeout(() => {
      span.remove();
    }, 800);
  }
}

console.log(sound.src);

</script>

</body>
</html>
